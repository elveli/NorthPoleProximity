<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f5f5f5"/>
  <g transform="translate(0, 40)">
    <circle cx="400" cy="40" r="24" fill="#e2e8f0"/>
    <text x="400" y="46" font-family="sans-serif" font-size="20" text-anchor="middle" fill="#334155">🌍</text>
    <text x="400" y="90" font-family="sans-serif" font-size="36" font-weight="300" text-anchor="middle" fill="#0f172a">North Pole Proximity</text>
    <text x="400" y="120" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#64748b">Enter two cities to find out which one is further north and calculate</text>
    <text x="400" y="142" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#64748b">the exact distance difference to the North Pole.</text>

    <rect x="100" y="180" width="600" height="210" rx="24" fill="#ffffff" stroke="#f1f5f9" stroke-width="2"/>
    
    <text x="140" y="220" font-family="sans-serif" font-size="14" font-weight="500" fill="#334155">First City</text>
    <rect x="140" y="230" width="250" height="48" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="155" y="260" font-family="sans-serif" font-size="16" fill="#94a3b8">📍</text>
    <text x="180" y="259" font-family="sans-serif" font-size="16" fill="#0f172a">London, UK</text>

    <text x="410" y="220" font-family="sans-serif" font-size="14" font-weight="500" fill="#334155">Second City</text>
    <rect x="410" y="230" width="250" height="48" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="425" y="260" font-family="sans-serif" font-size="16" fill="#94a3b8">📍</text>
    <text x="450" y="259" font-family="sans-serif" font-size="16" fill="#0f172a">New York, NY</text>

    <rect x="140" y="310" width="520" height="48" rx="12" fill="#0f172a"/>
    <text x="400" y="339" font-family="sans-serif" font-size="16" font-weight="500" text-anchor="middle" fill="#ffffff">🧭 Compare Cities</text>
  </g>
</svg>
